<!DOCTYPE html>
<html>
<head>
    <title>Workout Routine</title>

    <style>
        body{background-color: whitesmoke; font-family: Arial;}
        .box{width: 220px; padding: 10px; border: 2px solid black; position: absolute;}
        #warmup{background-color: goldenrod; top: 20px; left: 20px;}
        #workout{background-color: lightskyblue; top: 100px; left: 200px;}
        #cooldown{background-color: lightgreen; top: 200px; left: 350px}
        h3{color: darkblue;}
    </style>
</head>

<body>
<div class="box" id="warmup">
    <h3>Warm Up</h3>
    <ul>
        <li>Jumping Jacks</li>
        <li>Stretch Band</li>
        <li>High Knees</li>
    </ul>
</div>
<div class="box" id="workout">
    <h3>Main Workout</h3>
    <ul>
        <li>Push-ups</li>
        <li>Squats</li>
        <li>Plank</li>
    </ul>
</div>
<div class="box" id="cooldown">
    <h3>Cool Down</h3>
    <ul>
        <li>Stretch</li>
        <li>Deep Breathing</li>
        <li>Walk</li>
    </ul>
</div>
</body>
</html>
