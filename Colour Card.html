<html>
    <head>
        <title> Colours with CSS </title>
    </head>
    <style>
        li {color:fuchsia;}
        ol {color:forestgreen}
        body {background-color:darkblue;}
        * {font-size: 20;}
        .more_info {color:darkgray; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        #even_more_info {color:aqua; font-size: larger; font-style: italic;}
    </style>
    <body>
        <h1 style="color:coral"> Welcome to my About Me page</h1>
        <p style="color:darkseagreen"> My name is Harshith</p>
        <h1 style="color:gold"> My favourite things</h1>
        <ol>
            <li> Aeroplanes</li>
            <li> Cats </li>
            <li> Chocolate </li>
            <li> Staying Organized </li>
        </ol>
        <p class="more_info"> My bday is on the 12th of September.</p>
        <p class="more_info"> I like all the shades of blue. </p>
        <div id="even_more_info">
            <p> I live in Chennai.</p>
        </div>
    </body>
<html>
