<html>
<head>
    <title>Advanced Form</title>
</head>
<body>
    <h1>Registration Form</h1>

    <form>
        <fieldset>
            <legend> Personal Information </legend>
        <label>Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>
        <label>Contact Number (Won't be publicly displayed):</label><br>
        <input type="password" id="contact" placeholder="Contact Number"><br><br>
        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender">Male<br>
        <input type="radio" id="female" name="gender">Female<br><br>
        <label>Birthday</label>
        <input type="date" id="birthday" name="birthday">Birthday
        </fieldset>
        <fieldset>
            <legend> Log-in Credentials </legend>
        <label>E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Enter your E-mail ID"><br><br>
        <label>Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Password"><br><br>
        </fieldset>
        <fieldset>
            <legend> Personal Qualities </legend>
        <label>Favourite Colour</label>
        <input type="color" id="favcolor" name="favcolor"><br>
        <label>Age</label>
        <input type="text" id="age" name="age" placeholder="Age here"><br>
        </fieldset>
        <fieldset>
            <legend> Student Credentials</legend>
            <label>Former Roll.No</label>
            <input type="text" id="rollno" name="rollno" placeholder="Example:RN1234"><br>
            <label> Former Class</label><br>
            <input type="radio" id="12A" name="class-previous"> 12A<br>
            <input type="radio" id="12B" name="class-previous"> 12B<br>
            <input type="radio" id="12C" name="class-previous"> 12C<br>
            <input type="radio" id="12D" name="class-previous"> 12D<br>
            <input type="radio" id="12E" name="class-previous"> 12E<br>
            <input type="radio" id="12F" name="class-previous"> 12F<br>
            <input type="radio" id="12G" name="class-previous"> 12G<br>
            <input type="radio" id="12H" name="class-previous"> 12H<br>
            <input type="radio" id="12I" name="class-previous"> 12I<br>
        </fieldset>
        <fieldset>
            <legend> Course details </legend>
        <label>Courses to attend:</label><br>
        <input type="checkbox" id="courses" name="financial math">Financial Math<br>
        <input type="checkbox" id="courses" name="trignometry">Trignometry<br>
        <input type="checkbox" id="courses" name="algebra">Algebra<br>
        <input type="checkbox" id="courses" name="arithmetic">Arithmetics<br><br>
        <label> Course Duration </label><br>
        <input type="radio" id="course-duration" name="1 month">1 month<br>
        <input type="radio" id="course-duration" name="2 months">2 months<br><br>
        <label> 12th grade marks </label><br><br>
        <select name="Subject" id="subject">
            <form>
            <option value="Algebra">Algebra</option>
            <option value="Trignometry">Trignometry</option>
            <option value="Arithmetics">Arithmetics</option>
            <option value="Fin.Math">Financial Mathematics</option>
        </select>
        <input type="number" id="mark" name="mark"><br>
        <select name="Subject2" id="subject2">
            <option value="Algebra">Algebra</option>
            <option value="Trignometry">Trignometry</option>
            <option value="Arithmetics">Arithmetics</option>
            <option value="Fin.Math">Financial Mathematics</option>
        </select>
        <input type="number" id="mark2" name="mark2"><br>
        <select name="Subject3" id="subject3">
            <option value="Algebra">Algebra</option>
            <option value="Trignometry">Trignometry</option>
            <option value="Arithmetics">Arithmetics</option>
            <option value="Fin.Math">Financial Mathematics</option>
        </select>
        <input type="number" id="mark3" name="mark3"><br>
        <select name="Subject4" id="subject4">
            <option value="Algebra">Algebra</option>
            <option value="Trignometry">Trignometry</option>
            <option value="Arithmetics">Arithmetics</option>
            <option value="Fin.Math">Financial Mathematics</option>
        </select>
        <input type="number" id="mark4" name="mark4"><br><br>
     </form>
        </fieldset><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
